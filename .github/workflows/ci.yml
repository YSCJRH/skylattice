name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install web workspace dependencies
        run: npm ci

      - name: Validate hosted app preview proof data
        run: npm run web:preview:check

      - name: Build hosted web app
        run: npm run web:build

      - name: Install package and test dependencies
        run: python -m pip install -e .[dev]

      - name: Run tracked validation suite
        run: python tools/run_validation_suite.py

      - name: Build Pages site
        env:
          NO_MKDOCS_2_WARNING: 'true'
        run: python -m mkdocs build --strict
